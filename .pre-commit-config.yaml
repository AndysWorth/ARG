# Pre-commit hook configuration.
# Install once per clone:
#   pip install pre-commit && pre-commit install && pre-commit autoupdate
# Hooks then run on every `git commit`. Never bypass with `--no-verify`
# (see CLAUDE.md "When to intervene").

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-case-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        args: ["--config-file=pyproject.toml"]
        # mypy needs the project's deps to type-check imports. Once Section 3
        # lands and `pip install -e .` works, mypy will resolve third-party types.
        # Until then it runs with `ignore_missing_imports = true` (configured
        # in pyproject.toml) and only checks our own code.
        additional_dependencies: []
        pass_filenames: true
