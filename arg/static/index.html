<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ARG — Archivist RAG Graph</title>
  <link rel="icon" href="data:," />
  <style>
    :root {
      --bg: #0e1116;
      --fg: #e6e9ef;
      --muted: #9aa3b2;
      --accent: #5fd0b5;
      --panel: #161b22;
      --border: #2b313a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font: 14px/1.4 -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg); color: var(--fg);
      display: grid; grid-template-rows: auto 1fr; height: 100vh;
    }
    header {
      padding: 12px 20px; border-bottom: 1px solid var(--border);
      display: flex; gap: 16px; align-items: center;
    }
    header h1 { font-size: 16px; margin: 0; }
    header .muted { color: var(--muted); font-size: 12px; }
    main {
      display: grid; grid-template-columns: 280px 1fr 380px;
      gap: 0; overflow: hidden; min-height: 0;
    }
    aside, section, .right {
      padding: 16px; overflow: auto; border-right: 1px solid var(--border);
    }
    .right { border-right: 0; border-left: 1px solid var(--border); }
    h2 { font-size: 13px; margin: 0 0 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    .doc { padding: 6px 8px; border-radius: 4px; cursor: pointer; }
    .doc:hover { background: var(--panel); }
    .doc.active { background: var(--panel); border-left: 2px solid var(--accent); padding-left: 6px; }
    .query-box { display: flex; gap: 8px; margin-bottom: 16px; }
    .query-box input {
      flex: 1; padding: 10px 12px; background: var(--panel); color: var(--fg);
      border: 1px solid var(--border); border-radius: 6px; font: inherit;
    }
    button {
      padding: 10px 16px; background: var(--accent); color: #0e1116;
      border: 0; border-radius: 6px; font: inherit; font-weight: 600; cursor: pointer;
    }
    .answer { white-space: pre-wrap; background: var(--panel); padding: 16px; border-radius: 6px; }
    .sources { margin-top: 16px; font-size: 12px; }
    .source-row { padding: 4px 0; color: var(--muted); }
    .source-row .title { color: var(--fg); }
    .source-row a.title { text-decoration: none; }
    .source-row a.title:hover { color: var(--accent); text-decoration: underline; }
    #graph { height: 380px; background: var(--panel); border-radius: 6px; }
    .pill {
      display: inline-block; padding: 2px 8px; border-radius: 999px;
      background: var(--panel); color: var(--muted); font-size: 11px;
    }
    .empty { color: var(--muted); font-style: italic; }
  </style>
</head>
<body>
  <header>
    <h1>ARG <span class="muted">— Archivist RAG Graph</span></h1>
    <span class="pill" id="health-pill">connecting…</span>
    <span class="muted" id="corpus-pill"></span>
  </header>
  <main>
    <aside>
      <h2>Documents</h2>
      <div id="doc-list"><div class="empty">Loading…</div></div>
      <h2 style="margin-top: 24px;">Topics</h2>
      <div id="topic-list"><div class="empty">Loading…</div></div>
    </aside>

    <section>
      <div class="query-box">
        <input id="q" type="text" placeholder="Ask anything…" />
        <button id="ask">Ask</button>
      </div>
      <div id="answer" class="answer empty">Ask a question above.</div>
      <div id="sources" class="sources"></div>

      <h2 style="margin-top: 24px;">Topic clusters</h2>
      <div id="graph"></div>
    </section>

    <div class="right">
      <h2>Document detail</h2>
      <div id="doc-detail" class="empty">Select a document on the left.</div>
    </div>
  </main>

  <script src="/static/d3.min.js"></script>
  <script>
    const corpus = new URLSearchParams(location.search).get("corpus") || "default";
    document.getElementById("corpus-pill").textContent = "corpus: " + corpus;

    async function api(path, opts = {}) {
      const sep = path.includes("?") ? "&" : "?";
      const url = path + sep + "corpus=" + encodeURIComponent(corpus);
      const r = await fetch(url, opts);
      if (!r.ok) throw new Error(r.status + " " + (await r.text()));
      return r.json();
    }

    async function refreshHealth() {
      try {
        const h = await api("/health");
        document.getElementById("health-pill").textContent =
          h.status + " · " + h.doc_count + " docs · " + h.chunk_count + " chunks";
      } catch (e) {
        document.getElementById("health-pill").textContent = "offline";
      }
    }

    async function refreshDocs() {
      const docs = await api("/corpus");
      const el = document.getElementById("doc-list");
      el.innerHTML = "";
      docs.forEach(d => {
        const row = document.createElement("div");
        row.className = "doc";
        row.textContent = d.title || d.doc_id;
        row.addEventListener("click", () => loadDoc(d.doc_id, row));
        el.appendChild(row);
      });
      if (docs.length === 0) el.innerHTML = '<div class="empty">No documents indexed.</div>';
    }

    async function refreshTopics() {
      try {
        const topics = await api("/corpus/topics");
        const el = document.getElementById("topic-list");
        el.innerHTML = "";
        topics.forEach(t => {
          const row = document.createElement("div");
          row.className = "doc";
          row.textContent = t.label + " (" + t.doc_ids.length + ")";
          el.appendChild(row);
        });
      } catch (e) {
        document.getElementById("topic-list").innerHTML =
          '<div class="empty">Topics unavailable.</div>';
      }
    }

    async function loadDoc(docId, rowEl) {
      document.querySelectorAll(".doc.active").forEach(d => d.classList.remove("active"));
      if (rowEl) rowEl.classList.add("active");
      const el = document.getElementById("doc-detail");
      el.innerHTML = "Loading…";
      try {
        const meta = await api("/corpus/" + encodeURIComponent(docId));
        el.innerHTML = "<h3>" + meta.title + "</h3>" +
          "<div class='muted'>" + meta.file_type + " · " + meta.chunk_count + " chunks</div>" +
          "<h2 style='margin-top:16px;'>Key points</h2>" +
          "<ul>" + meta.key_points.map(p => "<li>" + p + "</li>").join("") + "</ul>";
      } catch (e) {
        el.innerHTML = "<div class='empty'>" + e.message + "</div>";
      }
    }

    async function ask() {
      const q = document.getElementById("q").value.trim();
      if (!q) return;
      const answerEl = document.getElementById("answer");
      const sourcesEl = document.getElementById("sources");
      answerEl.textContent = "Thinking…";
      sourcesEl.innerHTML = "";
      try {
        const r = await fetch("/query?corpus=" + encodeURIComponent(corpus), {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify({ question: q }),
        });
        const data = await r.json();
        answerEl.textContent = data.answer || "(no answer)";
        sourcesEl.innerHTML = "<h2>Sources</h2>" + data.sources.map(s =>
          "<div class='source-row'><a class='title' href='/file?corpus=" +
          encodeURIComponent(corpus) + "&path=" + encodeURIComponent(s.doc_id) +
          "' target='_blank' rel='noopener'>" + (s.title || s.doc_id) + "</a>" +
          (s.heading_path ? " — " + s.heading_path : "") + "</div>"
        ).join("");
      } catch (e) {
        answerEl.textContent = e.message;
      }
    }

    async function refreshGraph() {
      if (!window.d3) return;
      try {
        const [docs, topics] = await Promise.all([api("/corpus"), api("/corpus/topics")]);
        renderClusterGraph(docs, topics);
      } catch (e) { /* graph optional */ }
    }

    function renderClusterGraph(docs, topics) {
      const el = document.getElementById("graph");
      const w = el.clientWidth;
      const h = 380;
      d3.select("#graph").selectAll("*").remove();
      if (!topics.length) return;

      const titleMap = {};
      docs.forEach(d => { titleMap[d.doc_id] = d.title || d.doc_id; });

      const colors = d3.schemeTableau10;
      const cols = Math.ceil(Math.sqrt(topics.length));
      const rows = Math.ceil(topics.length / cols);
      const cellW = w / cols;
      const cellH = h / rows;
      const LABEL_H = 28; // pixels reserved at top of each cell for the label

      const clusterMeta = {};
      topics.forEach((topic, i) => {
        const col = i % cols;
        const row = Math.floor(i / cols);
        clusterMeta[i] = {
          x: (col + 0.5) * cellW,
          // center is in the usable area below the label strip
          y: row * cellH + LABEL_H + (cellH - LABEL_H) / 2,
          label: topic.label,
          color: colors[i % colors.length],
        };
      });

      const nodes = [];
      topics.forEach((topic, i) => {
        const c = clusterMeta[i];
        topic.doc_ids.forEach(doc_id => {
          nodes.push({
            id: doc_id,
            title: titleMap[doc_id] || doc_id,
            cluster: i,
            x: c.x + (Math.random() - 0.5) * 30,
            y: c.y + (Math.random() - 0.5) * 30,
          });
        });
      });

      const svg = d3.select("#graph").append("svg")
        .attr("width", w).attr("height", h)
        .style("cursor", "grab")
        .style("overflow", "hidden");

      // Hint text — stays fixed, outside the zoomable group
      svg.append("text")
        .attr("x", w - 6).attr("y", h - 6)
        .attr("text-anchor", "end")
        .attr("fill", "#9aa3b2").attr("font-size", "10px")
        .text("scroll to zoom · drag to pan");

      // All zoomable content goes in this group
      const g = svg.append("g");

      // Cluster labels — positioned in the reserved strip above the dots
      topics.forEach((_, i) => {
        const col = i % cols;
        const row = Math.floor(i / cols);
        g.append("text")
          .attr("x", (col + 0.5) * cellW)
          .attr("y", row * cellH + LABEL_H - 10)
          .attr("text-anchor", "middle")
          .attr("fill", clusterMeta[i].color)
          .attr("font-size", "11px")
          .attr("font-weight", "600")
          .attr("opacity", 0.9)
          .text(clusterMeta[i].label);
      });

      // Dividers
      for (let c = 1; c < cols; c++) {
        g.append("line")
          .attr("x1", c * cellW).attr("y1", 0)
          .attr("x2", c * cellW).attr("y2", h)
          .attr("stroke", "#2b313a").attr("stroke-width", 1);
      }
      for (let r = 1; r < rows; r++) {
        g.append("line")
          .attr("x1", 0).attr("y1", r * cellH)
          .attr("x2", w).attr("y2", r * cellH)
          .attr("stroke", "#2b313a").attr("stroke-width", 1);
      }

      const nodeEl = g.append("g").selectAll("circle").data(nodes)
        .join("circle")
        .attr("r", 7)
        .attr("fill", d => clusterMeta[d.cluster].color)
        .attr("opacity", 0.85)
        .attr("cursor", "pointer")
        .on("click", (event, d) => {
          window.open(
            "/file?corpus=" + encodeURIComponent(corpus) + "&path=" + encodeURIComponent(d.id),
            "_blank", "noopener"
          );
        });

      nodeEl.append("title").text(d => d.title);

      // Zoom + pan
      svg.call(
        d3.zoom()
          .scaleExtent([0.3, 8])
          .on("zoom", event => {
            g.attr("transform", event.transform);
            svg.style("cursor", event.transform.k !== 1 || event.sourceEvent?.type === "mousemove"
              ? "grabbing" : "grab");
          })
      );

      function clusterForce(alpha) {
        nodes.forEach(d => {
          const c = clusterMeta[d.cluster];
          d.vx += (c.x - d.x) * 0.15 * alpha;
          d.vy += (c.y - d.y) * 0.15 * alpha;
        });
      }

      d3.forceSimulation(nodes)
        .force("cluster", clusterForce)
        .force("charge", d3.forceManyBody().strength(-25))
        .force("collide", d3.forceCollide(9))
        .on("tick", () => {
          nodeEl.attr("cx", d => d.x).attr("cy", d => d.y);
        });
    }

    document.getElementById("ask").addEventListener("click", ask);
    document.getElementById("q").addEventListener("keydown", e => { if (e.key === "Enter") ask(); });

    refreshHealth();
    refreshDocs();
    refreshTopics();
    refreshGraph();
  </script>
</body>
</html>
